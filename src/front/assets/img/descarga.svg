<!-- marco-dragon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Color y grosor de la cenefa -->
    <style>
      .orn{fill:#3b2a21}
      .fade{fill:#3b2a21;opacity:.85}
    </style>

    <!-- Motivo curvo tipo filigrana/dragón para repetir en bordes -->
    <symbol id="motivo" viewBox="0 0 64 64">
      <path class="orn" d="M12 50c4-10 8-15 18-18-7-4-10-7-11-12 0-7 6-12 14-12 6 0 12 3 15 8 2 4 2 8 0 12 5 2 9 6 10 11-2 6-9 10-16 10-5 0-9-2-12-5-3 3-8 6-14 6-3 0-6 0-4-0zM31 17c-3 2-4 5-3 8 1 2 3 4 6 5 3-2 5-4 5-7 0-4-3-7-8-6z"></path>
    </symbol>

    <!-- Motivo vertical (girado) -->
    <symbol id="motivoV" viewBox="0 0 64 64">
      <use href="#motivo" transform="rotate(90 32 32)"></use>
    </symbol>

    <!-- Esquinas con cabezas estilizadas -->
    <symbol id="corner" viewBox="0 0 64 64">
      <path class="fade" d="M6 58c18-3 30-13 36-28 3-7 8-12 16-16-8-2-14 0-20 4-5 3-9 6-14 7-5 1-9-1-14-6 3 11 2 22-4 39z"></path>
      <path class="orn" d="M40 12c4 0 7 2 9 5-3 1-6 2-8 4-2 1-3 3-4 5-3-2-5-4-5-7 0-4 3-7 8-7z"></path>
    </symbol>
  </defs>

  <!-- Fondo transparente: NO dibujamos nada en el centro (128..384) -->
  <!-- Bordes: colocamos patrones a lo largo de las cuatro orillas dentro de una banda de 64–96 px -->

  <!-- TOP (y=0..64) -->
  <g transform="translate(0,8)">
    <!-- esquinas -->
    <use href="#corner" x="0" y="0"></use>
    <use href="#corner" x="448" y="0" transform="scale(-1,1) translate(-960,0)"></use>
    <!-- repetición de motivos -->
    <g transform="translate(64,0)">
      <!-- 7 piezas de 64px para cubrir 384px -->
      <use href="#motivo" x="0" y="0"></use>
      <use href="#motivo" x="64" y="0"></use>
      <use href="#motivo" x="128" y="0"></use>
      <use href="#motivo" x="192" y="0"></use>
      <use href="#motivo" x="256" y="0"></use>
      <use href="#motivo" x="320" y="0"></use>
    </g>
  </g>

  <!-- BOTTOM (y=448..512) -->
  <g transform="translate(0,448)">
    <use href="#corner" x="0" y="0" transform="scale(1,-1) translate(0,-64)"></use>
    <use href="#corner" x="448" y="0" transform="scale(-1,-1) translate(-960,-64)"></use>
    <g transform="translate(64,0)">
      <use href="#motivo" x="0" y="0" transform="scale(1,-1) translate(0,-64)"></use>
      <use href="#motivo" x="64" y="0" transform="scale(1,-1) translate(0,-64)"></use>
      <use href="#motivo" x="128" y="0" transform="scale(1,-1) translate(0,-64)"></use>
      <use href="#motivo" x="192" y="0" transform="scale(1,-1) translate(0,-64)"></use>
      <use href="#motivo" x="256" y="0" transform="scale(1,-1) translate(0,-64)"></use>
      <use href="#motivo" x="320" y="0" transform="scale(1,-1) translate(0,-64)"></use>
    </g>
  </g>

  <!-- LEFT (x=0..64) -->
  <g transform="translate(8,64)">
    <use href="#corner" x="0" y="0" transform="rotate(-90 32 32)"></use>
    <use href="#corner" x="0" y="384" transform="rotate(180 32 224)"></use>
    <g transform="translate(0,64)">
      <!-- 5 piezas verticales de 64px para cubrir ~320px -->
      <use href="#motivoV" x="0" y="0"></use>
      <use href="#motivoV" x="0" y="64"></use>
      <use href="#motivoV" x="0" y="128"></use>
      <use href="#motivoV" x="0" y="192"></use>
      <use href="#motivoV" x="0" y="256"></use>
    </g>
  </g>

  <!-- RIGHT (x=448..512) -->
  <g transform="translate(448,64)">
    <use href="#corner" x="0" y="0" transform="rotate(90 32 32)"></use>
    <use href="#corner" x="0" y="384" transform="rotate(0 32 32) scale(-1,1) translate(-64,0)"></use>
    <g transform="translate(0,64)">
      <use href="#motivoV" x="0" y="0" transform="scale(-1,1) translate(-64,0)"></use>
      <use href="#motivoV" x="0" y="64" transform="scale(-1,1) translate(-64,0)"></use>
      <use href="#motivoV" x="0" y="128" transform="scale(-1,1) translate(-64,0)"></use>
      <use href="#motivoV" x="0" y="192" transform="scale(-1,1) translate(-64,0)"></use>
      <use href="#motivoV" x="0" y="256" transform="scale(-1,1) translate(-64,0)"></use>
    </g>
  </g>
</svg>
