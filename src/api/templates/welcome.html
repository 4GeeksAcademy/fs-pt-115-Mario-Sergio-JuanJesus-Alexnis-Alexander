<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Master Of Infinity</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #f4f4f4; padding: 40px 0;">
        <tr>
            <td align="center">
                <table cellpadding="0" cellspacing="0" border="0" width="500" style="max-width: 500px; background-color: #ffffff; border-radius: 10px; overflow: hidden; border: 1px solid #ddd;">
                    
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #2c3e50; padding: 40px 30px; text-align: center;">
                            <h1 style="color: #d4af37; font-size: 28px; margin: 0; font-weight: bold;">
                                🐉 Master Of Infinity
                            </h1>
                            <p style="color: #ecf0f1; margin: 10px 0 0 0; font-size: 14px;">
                                Dungeons & Dragons
                            </p>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 30px; text-align: center; background-color: #ffffff;">
                            <h2 style="color: #2c3e50; font-size: 24px; margin: 0 0 20px 0;">
                                Welcome, {{username}}!
                            </h2>
                            
                            <div style="width: 50px; height: 2px; background-color: #d4af37; margin: 0 auto 30px auto;"></div>
                            
                            <p style="color: #555555; font-size: 16px; line-height: 1.6; margin: 0 0 30px 0;">
                                You have successfully registered at <strong style="color: #d4af37;">Master Of Infinity</strong>.<br>
                                Your epic adventure is about to begin.
                            </p>
                            
                            <p style="color: #777777; font-size: 14px; margin: 30px 0 0 0;">
                                May the dice roll in your favor! 🎲
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8f9fa; padding: 20px 30px; text-align: center; border-top: 1px solid #e9ecef;">
                            <p style="color: #6c757d; font-size: 12px; margin: 0; line-height: 1.4;">
                                © 2024 Master Of Infinity<br>
                                This message was sent because you registered on our platform.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
